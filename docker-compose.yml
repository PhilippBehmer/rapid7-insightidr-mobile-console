services:
  pocketsoc:
    image: ${POCKETSOC_IMAGE:-philippbehmer/rapid7-insightidr-mobile-console:latest}
    ports:
      - "${POCKETSOC_HOST_PORT:-3000}:3000"
    environment:
      POCKETSOC_CONFIG_FILE: /app/data/config.json
      POCKETSOC_SESSION_SECRET: ${POCKETSOC_SESSION_SECRET:-}
      POCKETSOC_SESSION_SECRET_FILE: ${POCKETSOC_SESSION_SECRET_FILE:-}
    volumes:
      - pocketsoc-data:/app/data
    restart: unless-stopped

volumes:
  pocketsoc-data:
